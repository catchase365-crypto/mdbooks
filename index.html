<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD 知识库阅读器 (全站索引版)</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    
    <style>
        :root { --bg-color: #0d1117; --text-color: #c9d1d9; --accent: #58a6ff; --heading-color: #58a6ff; --font-scale: 1; }
        .markdown-body { font-size: calc(16px * var(--font-scale)) !important; }
        #theme-dark-pad { position: fixed; bottom: 0; left: 0; width: 60px; height: 60px; z-index: 9999; cursor: pointer; background: transparent; }
        #theme-light-pad { position: fixed; bottom: 0; right: 0; width: 60px; height: 60px; z-index: 9999; cursor: pointer; background: transparent; }
        #zoom-out { position: fixed; left: 0; top: 30%; height: 40%; width: 50px; z-index: 9999; cursor: pointer; }
        #zoom-in { position: fixed; right: 0; top: 30%; height: 40%; width: 50px; z-index: 9999; cursor: pointer; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        
        /* 目录样式 */
        #list-view { max-width: 800px; margin: 40px auto; padding: 20px; }
        .list-header { border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* 树状目录核心 CSS */
        .tree-list { list-style: none; padding-left: 20px; margin: 0; }
        #list-content > .tree-list, #sidebar-list > .tree-list { padding-left: 0; } /* 最外层不缩进 */
        .tree-node { 
            display: flex; align-items: center; padding: 12px 15px; margin: 5px 0;
            color: var(--accent); border-radius: 6px; cursor: pointer;
            background: rgba(255,255,255,0.03); transition: 0.2s; border: 1px solid transparent;
        }
        .tree-node:hover { background: rgba(255,255,255,0.08); border-color: #8b949e; }
        .tree-node .icon { margin-right: 10px; font-size: 1.1em; }
        .tree-node .text { color: var(--text-color); }
        .file-node .text { color: var(--accent); }
        
        .folder-children { display: none; margin-left: 10px; border-left: 1px dashed #30363d; }
        .folder-open > .folder-children { display: block; }
        .duration-tag { background: var(--accent); color: var(--bg-color); padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-right: 8px; font-weight: bold; }

        /* 阅读器容器 */
        #reader-view { display: none; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .markdown-body { color: var(--text-color) !important; background-color: var(--bg-color) !important; min-width: 200px; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { color: var(--heading-color) !important; border-bottom-color: var(--accent) !important; }

        /* 侧栏目录 */
        #sidebar { 
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%; 
            background: #0d1117; transition: 0.3s; z-index: 2000; padding: 60px 20px 20px; overflow-y: auto; box-sizing: border-box;
        }
        #sidebar.open { right: 0; }
        #back-to-list { 
            cursor: pointer; position: fixed; top: 0; right: 0; 
            width: 50px; height: 50px; z-index: 3000; background: transparent; 
        }

        .loading { text-align: center; color: #8b949e; margin-top: 100px; font-size: 1.2em; }
    </style>

    <link rel="manifest" href="manifest.json">
    <script>
        if('service-worker' in navigator){navigator.serviceWorker.register('sw.js');}
        function triggerFullScreen() {
            var d = document.documentElement;
            var fn = d.requestFullscreen || d.webkitRequestFullScreen || d.mozRequestFullScreen || d.msRequestFullscreen;
            if(fn) fn.call(d);
        }
    </script>
</head>
<body>

    <div id="list-view">
        <div class="list-header">
            <h2>Markdown 全站知识库</h2>
            <p id="file-count">正在抓取云端索引...</p>
            <div style="margin: 10px 0;">
                <button onclick="saveAllToLocal()" style="background:var(--accent); color:var(--bg-color); border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">保存所有文档到离线缓存</button>
                <button onclick="clearLocalCache()" style="background:#30363d; color:#c9d1d9; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-left:10px;">清除离线数据</button>
            </div>
            <div id="log-window" style="font-size: 12px; color: #8b949e; background: #161b22; padding: 10px; border-radius: 4px; height: 60px; overflow-y: auto;">日志：等待操作...</div>
        </div>
        <div id="list-content"></div>
    </div>

    <div id="reader-view">
        <div id="toggle-fullscreen" onclick="triggerFullScreen()" title="点击切换全屏" style="cursor: pointer; position: fixed; top: 0; left: 0; width: 50px; height: 50px; z-index: 1000;"></div>
        <div id="open-toc" title="点击查看大纲" style="cursor: pointer; position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 50px; z-index: 1000;"></div>
        <div id="back-to-list" title="点击切换侧边目录" style="cursor: pointer; position: fixed; top: 0; right: 0; width: 50px; height: 50px; z-index: 3000;"></div>
        <div id="offline-badge" style="position: fixed; top: 10px; right: 60px; font-size: 12px; color: orange; pointer-events: none; z-index: 3000; display: none;">Offline</div>
        
        <div id="sidebar">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>目录列表</h3>
                <button onclick="closeReader()" style="background: #30363d; border: none; color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer;">返回首页</button>
            </div>
            <div id="sidebar-list"></div>
        </div>
        
        <div id="toc-modal" style="display:none; position:fixed; top:10%; left:5%; right:5%; bottom:10%; background:rgba(13,17,23,0.98); z-index:5000; border-radius:10px; border:1px solid #30363d; flex-direction: column;">
            <div style="display:flex; justify-content:space-between; align-items: center; padding: 15px 20px; background: #161b22; border-bottom: 1px solid #30363d; border-radius: 10px 10px 0 0; position: sticky; top: 0;">
                <strong style="color: var(--accent);">文章大纲</strong>
                <button onclick="toggleAllToc()" style="cursor:pointer; background:#21262d; color:#c9d1d9; border:1px solid #8b949e; padding:4px 12px; border-radius:4px;">仅看一级/全部</button>
            </div>
            <div id="toc-content" style="padding: 10px 20px 20px; overflow-y: auto; flex: 1;"></div>
        </div>
        <div class="container">
            <article id="content" class="markdown-body">
                <div class="loading">内容加载中...</div>
            </article>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <script>
        // ==========================================
        // 核心配置区 (完美支持 index.json 架构)
        // ==========================================
        const REPO_OWNER = "catchase365-crypto";
        const REPO_NAME = "5s";
        const BRANCH = "main";
        // ==========================================
        
        const listView = document.getElementById('list-view');
        const readerView = document.getElementById('reader-view');
        const listContent = document.getElementById('list-content');
        const sidebarList = document.getElementById('sidebar-list');
        const markdownContent = document.getElementById('content');
        let currentFilePath = null; // 改用 path 作为唯一标识，防止不同文件夹下重名文件冲突
        
        // --- 1. 主题与字体缩放逻辑 (原封不动保留) ---
        function setRandomTheme(type) {
            const h = Math.floor(Math.random() * 360);
            const theme = {};
            if (type === 'dark') {
                theme.bg = `hsl(${h}, ${25 + Math.random() * 30}%, ${5 + Math.random() * 10}%)`;
                theme.text = `hsl(${h}, 10%, 85%)`;
                theme.heading = `hsl(${(h + 40) % 360}, 80%, 75%)`;
                theme.accent = `hsl(${(h + 180) % 360}, 70%, 60%)`;
            } else {
                theme.bg = `hsl(${h}, ${30 + Math.random() * 40}%, ${92 + Math.random() * 5}%)`;
                theme.text = `hsl(${h}, 20%, 20%)`;
                theme.heading = `hsl(${(h + 200) % 360}, 60%, 35%)`;
                theme.accent = `hsl(${h}, 80%, 45%)`;
            }
            applyTheme(theme);
        }

        function applyTheme(theme) {
            const root = document.documentElement;
            root.style.setProperty('--bg-color', theme.bg);
            root.style.setProperty('--text-color', theme.text);
            root.style.setProperty('--heading-color', theme.heading);
            root.style.setProperty('--accent', theme.accent);
            localStorage.setItem('custom_kb_theme', JSON.stringify(theme));
        }

        function initTheme() {
            const saved = localStorage.getItem('custom_kb_theme');
            if (saved) applyTheme(JSON.parse(saved));
        }

        function setFontScale(delta) {
            let scale = parseFloat(localStorage.getItem('kb_font_scale') || 1);
            scale = Math.max(0.5, Math.min(2.0, scale + delta));
            localStorage.setItem('kb_font_scale', scale);
            document.documentElement.style.setProperty('--font-scale', scale);
        }

        // --- 2. 核心大换血：拉取 index.json 并递归渲染树 ---
        async function loadFileList() {
            try {
                let treeData = [];
                let isOffline = false;

                try {
                    // 彻底废弃 API，改用 CDN 拉取唯一的静态树状索引
                    const jsonUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/index.json`;
                    const response = await fetch(jsonUrl, { cache: 'no-cache' });
                    if (!response.ok) throw new Error();
                    treeData = await response.json();
                    
                    // 将完整的 JSON 树存入离线缓存，确保离线也能渲染目录
                    localStorage.setItem('md_tree_cache', JSON.stringify(treeData));
                } catch (e) {
                    isOffline = true;
                    treeData = JSON.parse(localStorage.getItem('md_tree_cache') || '[]');
                    if (treeData.length === 0) throw new Error('网络连接中断且无离线索引数据');
                }

                if (isOffline) {
                    document.getElementById('file-count').innerHTML = `<span style="color:orange">[离线模式]</span> 已加载本地缓存的目录树`;
                } else {
                    document.getElementById('file-count').innerText = `索引加载成功，支持无穷层级分类`;
                }
                
                // 清空旧容器，开始递归挂载 DOM
                listContent.innerHTML = '';
                sidebarList.innerHTML = '';
                
                const mainTree = document.createElement('div');
                buildTreeDom(treeData, mainTree);
                listContent.appendChild(mainTree);
                
                // 侧边栏复用同一套 DOM 生成逻辑
                const sideTree = document.createElement('div');
                buildTreeDom(treeData, sideTree);
                sidebarList.appendChild(sideTree);

            } catch (err) { 
                listContent.innerHTML = `<p style="color:red">加载目录失败: ${err.message}</p>`; 
            }
        }

        // 递归渲染核心引擎
        function buildTreeDom(dataArray, container) {
            const ul = document.createElement('ul');
            ul.className = 'tree-list';
            
            // 自定义排序函数：支持提取字符串开头的数字进行数值比较，处理 1, 2, ... 10, 11 这种逻辑
            const sortedData = [...dataArray].sort((a, b) => {
                const parseNum = (str) => {
                    const match = str.match(/^(\d+)/);
                    return match ? parseInt(match[1], 10) : null;
                };
                const numA = parseNum(a.name);
                const numB = parseNum(b.name);

                if (numA !== null && numB !== null) {
                    return numA - numB;
                }
                return a.name.localeCompare(b.name, 'zh-CN');
            });

            // 检查目录是否包含有效的 md 文件（递归检查），并过滤掉根目录的 readme.md 等文件
            function hasMdFiles(items) {
                return items && items.some(item => {
                    if (item.type === 'file' && item.name.toLowerCase() === 'readme.md') return false;
                    return (item.type === 'file' && item.name.endsWith('.md')) || 
                           (item.type === 'dir' && hasMdFiles(item.children));
                });
            }

            sortedData.forEach(item => {
                if (item.type === 'dir' && !hasMdFiles(item.children)) return;
                if (item.type === 'file' && item.name.toLowerCase() === 'readme.md') return;
                
                const li = document.createElement('li');
                
                if (item.type === 'dir') {
                    li.className = 'folder-closed';
                    const nodeDiv = document.createElement('div');
                    nodeDiv.className = 'tree-node';
                    nodeDiv.innerHTML = `<span class="icon">📁</span><span class="text">${item.name}</span>`;
                    
                    nodeDiv.onclick = () => {
                        li.classList.toggle('folder-closed');
                        li.classList.toggle('folder-open');
                        nodeDiv.querySelector('.icon').innerText = li.classList.contains('folder-open') ? '📂' : '📁';
                    };
                    li.appendChild(nodeDiv);
                    
                    const childrenContainer = document.createElement('div');
                    childrenContainer.className = 'folder-children';
                    buildTreeDom(item.children, childrenContainer);
                    li.appendChild(childrenContainer);
                } 
                else if (item.type === 'file' && item.name.endsWith('.md')) {
                    // 文件节点
                    const nodeDiv = document.createElement('div');
                    nodeDiv.className = 'tree-node file-node';
                    
                    let titleHtml = item.title || item.name;
                    if (item.duration) {
                        titleHtml = `<span class="duration-tag">${item.duration}</span>${titleHtml}`;
                    }
                    nodeDiv.innerHTML = `<span class="icon">📄</span><span class="text">${titleHtml}</span>`;
                    
                    nodeDiv.onclick = () => {
                        const rawUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${item.path}`;
                        openReader(rawUrl, item.path, item.title || item.name);
                    };
                    li.appendChild(nodeDiv);
                }
                ul.appendChild(li);
            });
            container.appendChild(ul);
        }

        // --- 3. 离线缓存逻辑升级 (从树中提取所有 md 并存入) ---
        async function saveAllToLocal() {
            const log = document.getElementById('log-window');
            log.innerText = "正在分析目录树...";
            try {
                const treeData = JSON.parse(localStorage.getItem('md_tree_cache') || '[]');
                if(treeData.length === 0) throw new Error("请先刷新页面加载目录");

                // 扁平化提取所有文件路径
                const filesToDownload = [];
                function extractFiles(nodes) {
                    nodes.forEach(n => {
                        if (n.type === 'dir' && n.children) extractFiles(n.children);
                        else if (n.type === 'file' && n.name.endsWith('.md')) filesToDownload.push(n);
                    });
                }
                extractFiles(treeData);

                const cache = JSON.parse(localStorage.getItem('md_cache_data') || '{}');
                let newCount = 0;

                for (const file of filesToDownload) {
                    if (!cache[file.path]) { // 以 path 为防冲突的唯一键
                        log.innerText = `正在离线下载: ${file.name}`;
                        const rawUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${file.path}`;
                        const content = await (await fetch(rawUrl)).text();
                        cache[file.path] = content;
                        newCount++;
                    }
                }
                localStorage.setItem('md_cache_data', JSON.stringify(cache));
                log.innerText = `完成！新增离线缓存 ${newCount} 个文件。当前总缓存 ${Object.keys(cache).length} 份。`;
            } catch(e) {
                log.innerText = `离线下载中断: ${e.message}`;
            }
        }

        function clearLocalCache() {
            localStorage.removeItem('md_cache_data');
            localStorage.removeItem('md_tree_cache');
            document.getElementById('log-window').innerText = '离线缓存已清除，请刷新页面重新抓取索引。';
            document.getElementById('file-count').innerText = "无本地缓存";
        }

        // --- 4. 阅读器解析与滚动条记忆逻辑 (完美保留) ---
        async function openReader(rawUrl, filePath, displayTitle) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('toc-modal').style.display = 'none';
            document.body.style.overflow = '';
            
            if (currentFilePath === filePath && readerView.style.display === 'block') return;

            currentFilePath = null; // 切断旧监听
            listView.style.display = 'none';
            readerView.style.display = 'block';
            window.scrollTo(0, 0);
            
            markdownContent.innerHTML = '<div class="loading">正在深度解析文档...</div>';

            try {
                const cache = JSON.parse(localStorage.getItem('md_cache_data') || '{}');
                const mdText = cache[filePath] || await (await fetch(rawUrl)).text();
                document.getElementById('offline-badge').style.display = cache[filePath] ? 'block' : 'none';

                marked.setOptions({
                    highlight: (code, lang) => Prism.languages[lang] ? Prism.highlight(code, Prism.languages[lang], lang) : code,
                    breaks: true,
                    gfm: true
                });

                markdownContent.innerHTML = marked.parse(mdText);
                generateToc();
                Prism.highlightAll();
                document.title = displayTitle;

                // 恢复滚动进度
                const savedPos = localStorage.getItem('scroll_' + filePath);
                if (savedPos) {
                    setTimeout(() => {
                        window.scrollTo({ top: parseInt(savedPos), behavior: 'instant' });
                        currentFilePath = filePath;
                    }, 150);
                } else {
                    currentFilePath = filePath;
                }

            } catch (err) {
                markdownContent.innerHTML = `<div style="color:red">加载失败: ${err.message}</div>`;
            }
        }

        function closeReader() {
            document.getElementById('reader-view').style.display='none'; 
            document.getElementById('list-view').style.display='block'; 
            document.getElementById('sidebar').classList.remove('open');
            currentFilePath = null;
        }

        // --- 5. 交互杂项与大纲生成 (原封不动保留) ---
        document.getElementById('back-to-list').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        const tocModal = document.getElementById('toc-modal');
        document.getElementById('open-toc').addEventListener('click', () => {
            const isOpen = tocModal.style.display === 'flex';
            tocModal.style.display = isOpen ? 'none' : 'flex';
            document.body.style.overflow = isOpen ? '' : 'hidden';
        });

        function generateToc() {
            const headings = markdownContent.querySelectorAll('h1, h2, h3');
            const toc = document.getElementById('toc-content');
            toc.innerHTML = '';
            headings.forEach((h, i) => {
                if(!h.id) h.id = 'heading-' + i;
                const level = h.tagName.toLowerCase();
                const div = document.createElement('div');
                div.setAttribute('data-level', level);
                div.style.paddingLeft = (level === 'h1' ? '0' : level === 'h2' ? '20px' : '40px');
                div.style.cursor = 'pointer';
                div.style.margin = '8px 0';
                div.style.borderLeft = '2px solid transparent';
                div.innerHTML = h.innerText;
                div.onclick = () => { 
                    h.scrollIntoView({behavior: 'smooth'}); 
                    tocModal.style.display = 'none';
                    document.body.style.overflow = '';
                };
                toc.appendChild(div);
            });
        }

        function toggleAllToc() {
            const tocContainer = document.getElementById('toc-content');
            const items = Array.from(tocContainer.querySelectorAll('div[data-level]'));
            const isCollapsing = items.some(i => i.style.display !== 'none' && i.getAttribute('data-level') !== 'h1');
            let target = items.find(item => item.getBoundingClientRect().top > tocContainer.getBoundingClientRect().top);
            
            items.forEach(item => {
                if (item.getAttribute('data-level') !== 'h1') {
                    item.style.display = isCollapsing ? 'none' : 'block';
                }
            });
            if (target) target.scrollIntoView({ block: 'nearest' });
        }

        // 以 path 为键保存进度，彻底防止重名文件进度覆盖
        window.onscroll = () => {
            if (readerView.style.display === 'block' && currentFilePath) {
                localStorage.setItem('scroll_' + currentFilePath, window.scrollY);
            }
        };

        // --- 启动初始化 ---
        const savedScale = localStorage.getItem('kb_font_scale') || 1;
        document.documentElement.style.setProperty('--font-scale', savedScale);
        initTheme();
        loadFileList(); // 直接拉取并渲染 JSON 树
    </script>
    
    <div id="theme-dark-pad" onclick="setRandomTheme('dark')" title="随机深色模式"></div>
    <div id="theme-light-pad" onclick="setRandomTheme('light')" title="随机浅色模式"></div>
    <div id="zoom-out" onclick="setFontScale(-0.1)" title="缩小字体"></div>
    <div id="zoom-in" onclick="setFontScale(0.1)" title="放大字体"></div>
</body>
</html>
